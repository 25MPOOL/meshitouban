name: python.ci

on:
  push:
    paths:
      - "**/*.py"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # 3.6.3
      - name: Run setup
        run: mise run setup

      - name: Run fmt-check
        run: mise run fmt-check
      - name: Run lint-check
        run: mise run lint-check
      - name: Run test
        run: mise run test