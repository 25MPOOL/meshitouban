name: Check Action Pins
run-name: "Check Action Pins (#${{ github.event.pull_request.number }})"

on:
  pull_request:
    paths:
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-action-pins:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinact
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.56.7

      - name: Pin GitHub Actions
        run: pinact

      - name: Check workflow files are pinned
        run: git diff --quiet -- .github/workflows/
